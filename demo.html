<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermaven Proxy - Code Completion Demo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #cba6f7; white-space: nowrap; }
    header h1 span { color: #89b4fa; }
    .controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    select, button {
      background: #313244; color: #cdd6f4; border: 1px solid #45475a;
      border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer;
    }
    select:hover, button:hover { background: #45475a; }
    button.clear-btn { background: #f38ba8; color: #1e1e2e; border-color: #f38ba8; font-weight: 600; }
    button.clear-btn:hover { background: #eba0ac; }
    .status { font-size: 11px; color: #6c7086; display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #f38ba8; transition: background 0.3s; }
    .dot.connected { background: #a6e3a1; }
    .main-content { flex: 1; display: flex; min-height: 0; }
    .editor-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .editor-header {
      background: #181825; border-bottom: 1px solid #313244;
      padding: 6px 16px; font-size: 11px; color: #6c7086;
      display: flex; align-items: center; justify-content: space-between;
    }
    #editor-container { flex: 1; min-height: 0; }
    .hint {
      padding: 8px 16px; background: #181825; border-top: 1px solid #313244;
      font-size: 11px; color: #6c7086; text-align: center; flex-shrink: 0;
    }
    .hint kbd {
      background: #313244; border: 1px solid #45475a;
      border-radius: 3px; padding: 1px 4px; font-size: 10px; font-family: inherit;
    }
    .output-pane {
      width: 360px; border-left: 1px solid #313244;
      display: flex; flex-direction: column; background: #1e1e2e;
    }
    .output-header {
      background: #181825; border-bottom: 1px solid #313244;
      padding: 6px 14px; font-size: 11px; color: #6c7086;
      display: flex; align-items: center; justify-content: space-between;
    }
    #output {
      flex: 1; padding: 10px; overflow: auto;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px; line-height: 1.4;
    }
    .suggestion-item {
      padding: 8px 10px; margin-bottom: 6px;
      background: #181825; border: 1px solid #313244;
      border-radius: 6px; cursor: pointer; transition: border-color 0.15s;
    }
    .suggestion-item:hover { border-color: #89b4fa; }
    .suggestion-item.active { border-color: #a6e3a1; background: #1a1a2e; }
    .suggestion-meta {
      font-size: 9px; color: #6c7086; margin-bottom: 3px;
      display: flex; justify-content: space-between;
    }
    .suggestion-meta .lang { color: #cba6f7; }
    .suggestion-meta .time { color: #89b4fa; }
    .suggestion-text {
      color: #a6e3a1; white-space: pre-wrap; word-break: break-word;
      font-size: 11px; max-height: 50px; overflow: hidden;
    }
    .empty-state { color: #6c7086; font-style: italic; text-align: center; padding: 30px 10px; font-size: 12px; }
    .ghost-label {
      font-size: 9px; color: #89b4fa; padding: 2px 6px; margin-bottom: 2px;
      background: #181825; border-radius: 3px; display: inline-block;
    }
    .highlight-preview {
      border-top: 1px solid #313244; max-height: 160px; overflow: auto;
    }
    .highlight-preview pre { margin: 0; padding: 12px; }
    .highlight-preview code {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
    }
    @media (max-width: 800px) {
      .main-content { flex-direction: column; }
      .output-pane { width: 100%; border-left: none; border-top: 1px solid #313244; max-height: 250px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Supermaven Proxy <span>Demo</span></h1>
    <div class="controls">
      <select id="language">
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="cpp">C / C++</option>
        <option value="csharp">C#</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="ruby">Ruby</option>
        <option value="php">PHP</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="sql">SQL</option>
        <option value="shell">Shell</option>
        <option value="json">JSON</option>
        <option value="xml">XML</option>
        <option value="markdown">Markdown</option>
      </select>
      <button id="clearBtn" class="clear-btn">Clear</button>
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Checking...</span>
      </div>
    </div>
  </header>

  <div class="main-content">
    <div class="editor-pane">
      <div class="editor-header">
        <span>Editor - ghost text appears after cursor</span>
        <span id="cursorPos">Ln 1, Col 1</span>
      </div>
      <div id="editor-container"></div>
      <div class="hint">
        Suggestions appear as <span style="color:#a6e3a1">green ghost text</span> after your cursor.
        Press <kbd>Tab</kbd> to accept, <kbd>Esc</kbd> to dismiss.
      </div>
    </div>
    <div class="output-pane">
      <div class="output-header">
        <span>Last 5 Suggestions</span>
        <button id="clearLogBtn" style="font-size:10px;padding:2px 6px;">Clear</button>
      </div>
      <div id="output"><div class="empty-state">Start typing to see suggestions...</div></div>
      <div class="highlight-preview" id="preview" style="display:none;">
        <pre><code id="previewCode"></code></pre>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>
    const API_BASE = window.location.origin;
    const outputEl = document.getElementById('output');
    const previewEl = document.getElementById('preview');
    const previewCodeEl = document.getElementById('previewCode');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const languageSelect = document.getElementById('language');
    const clearBtn = document.getElementById('clearBtn');
    const clearLogBtn = document.getElementById('clearLogBtn');
    const cursorPosEl = document.getElementById('cursorPos');

    const hljsLangMap = {
      javascript: 'javascript', typescript: 'typescript', python: 'python',
      java: 'java', cpp: 'cpp', csharp: 'csharp', go: 'go', rust: 'rust',
      ruby: 'ruby', php: 'php', html: 'html', css: 'css', sql: 'sql',
      shell: 'bash', json: 'json', xml: 'xml', markdown: 'markdown'
    };

    const recentCompletions = [];
    const MAX_RECENT = 5;
    let editor = null;
    let currentInlineItem = null;
    let debounceTimer = null;

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderRecentCompletions() {
      if (recentCompletions.length === 0) {
        outputEl.innerHTML = '<div class="empty-state">Start typing to see suggestions...</div>';
        return;
      }
      outputEl.innerHTML = recentCompletions.map((c, i) => {
        const preview = c.text.length > 100 ? c.text.substring(0, 100) + '...' : c.text;
        const activeClass = i === 0 ? ' active' : '';
        return `<div class="suggestion-item${activeClass}">
          <div class="suggestion-meta">
            <span class="lang">${c.lang}</span>
            <span class="time">${c.elapsed}</span>
          </div>
          <div class="suggestion-text">${escapeHtml(preview)}</div>
        </div>`;
      }).join('');
    }

    let lastCompletionTime = null;

    function addCompletion(text, lang) {
      const now = Date.now();
      const elapsed = lastCompletionTime ? (now - lastCompletionTime) + 'ms' : 'first';
      lastCompletionTime = now;

      recentCompletions.unshift({ text, lang, elapsed, time: now });
      while (recentCompletions.length > MAX_RECENT) recentCompletions.pop();
      renderRecentCompletions();

      const previewLang = hljsLangMap[lang] || 'javascript';
      previewCodeEl.textContent = text;
      previewCodeEl.className = `language-${previewLang}`;
      hljs.highlightElement(previewCodeEl);
      previewEl.style.display = 'block';
    }

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

    require(['vs/editor/editor.main'], function () {
      editor = monaco.editor.create(document.getElementById('editor-container'), {
        value: `function fibonacci(n) {\n  if (n <= 1) return n;\n  return fibonacci(n - 1) + fibonacci(n - 2);\n}\n\n// Try typing below:\n`,
        language: 'javascript',
        theme: 'vs-dark',
        fontSize: 14,
        tabSize: 2,
        minimap: { enabled: false },
        automaticLayout: true,
        padding: { top: 10 },
        inlineSuggest: { enabled: true },
        wordBasedSuggestions: 'off',
        quickSuggestions: false
      });

      editor.onDidChangeCursorPosition((e) => {
        cursorPosEl.textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
      });

      monaco.languages.registerInlineCompletionsProvider('*', {
        provideInlineCompletions: function(model, position, context, token) {
          return new Promise((resolve) => {
            if (token.isCancellationRequested) { resolve({ items: [] }); return; }

            if (debounceTimer) clearTimeout(debounceTimer);

            debounceTimer = setTimeout(() => {
              if (token.isCancellationRequested) { resolve({ items: [] }); return; }

              const fullText = model.getValue();
              const offset = model.getOffsetAt(position);
              const prompt = fullText.substring(0, offset);

              fetch(`${API_BASE}/v1/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, model: 'supermaven-free', max_tokens: 256 })
              })
              .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
              })
              .then(data => {
                let text = data.choices?.[0]?.text || '';
                if (!text || !text.trim() || text === 'No completion available') {
                  resolve({ items: [] });
                  return;
                }

                text = text.replace(/\r/g, '');

                const langMode = model.getLanguageId();
                addCompletion(text, langMode);

                resolve({
                  items: [{
                    insertText: text,
                    range: new monaco.Range(
                      position.lineNumber, position.column,
                      position.lineNumber, position.column
                    )
                  }]
                });
              })
              .catch(err => {
                console.error('Completion error:', err);
                resolve({ items: [] });
              });
            }, 150);
          });
        },
        freeInlineCompletions: function(completions) {}
      });

      editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Space, () => {
        editor.trigger('keyboard', 'editor.action.inlineSuggest.trigger', {});
      });

      editor.focus();
    });

    languageSelect.addEventListener('change', () => {
      if (editor) {
        monaco.editor.setModelLanguage(editor.getModel(), languageSelect.value);
      }
    });

    clearBtn.addEventListener('click', () => {
      if (editor) {
        editor.setValue('');
        editor.focus();
      }
      recentCompletions.length = 0;
      renderRecentCompletions();
      previewEl.style.display = 'none';
    });

    clearLogBtn.addEventListener('click', () => {
      recentCompletions.length = 0;
      renderRecentCompletions();
      previewEl.style.display = 'none';
    });

    async function checkHealth() {
      try {
        const r = await fetch(`${API_BASE}/health`);
        statusDot.classList.toggle('connected', r.ok);
        statusText.textContent = r.ok ? 'Connected' : 'Error';
      } catch {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Offline';
      }
    }
    checkHealth();
    setInterval(checkHealth, 10000);
  </script>
</body>
</html>
